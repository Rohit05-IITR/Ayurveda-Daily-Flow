<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Dincharya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-50:  #f0faf0;
      --green-100: #daf3d8;
      --green-200: #b5e6b2;
      --green-400: #5cb85c;
      --green-500: #4aa04a;
      --green-600: #3a8a3a;
      --beige-50:  #fdf8f0;
      --beige-100: #f7edd8;
      --beige-200: #edd9b8;
      --brown-700: #5c4033;
      --text-dark: #1e2d1f;
      --text-mid:  #4a5e4b;
      --text-light:#7a9478;
      --radius:    16px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #fafdf7;
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .navbar {
      background: rgba(250,253,247,0.95);
      backdrop-filter: blur(12px);
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      padding: 0.9rem 2rem;
    }

    .nav-container {
      max-width: 1160px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }

    .logo-leaf { font-size: 1.4rem; }

    .logo-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--green-600);
      letter-spacing: -0.02em;
    }

    .nav-back {
      font-size: 0.9rem;
      color: var(--text-mid);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--green-600); }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .circle-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(90,185,90,0.08) 0%, transparent 70%);
      top: -100px; right: -80px;
    }

    .circle-2 {
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(237,217,184,0.3) 0%, transparent 70%);
      bottom: 0; left: -60px;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      position: relative;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 2.75rem 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.09);
      position: relative;
      z-index: 1;
    }

    .card-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--beige-100);
      color: var(--brown-700);
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      margin-bottom: 1.4rem;
      letter-spacing: 0.02em;
    }

    .card h1 {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .card-subtitle {
      font-size: 0.92rem;
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      border: 1.5px solid #dce8dc;
      border-radius: var(--radius-sm);
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      color: var(--text-dark);
      background: var(--green-50);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input::placeholder { color: var(--text-light); }

    .form-group input:focus {
      border-color: var(--green-400);
      box-shadow: 0 0 0 3px rgba(90,185,90,0.12);
      background: white;
    }

    .form-group input.input-error {
      border-color: #e05252;
      box-shadow: 0 0 0 3px rgba(224,82,82,0.1);
    }

    .error-msg {
      font-size: 0.78rem;
      color: #d64444;
      margin-top: 0.4rem;
      display: none;
    }

    .error-msg.visible { display: block; }

    .alert {
      display: none;
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    .alert.error {
      background: #fff3f3;
      border: 1px solid #f5c2c2;
      color: #c0392b;
    }

    .alert.success {
      background: var(--green-100);
      border: 1px solid var(--green-200);
      color: #2e6e2e;
    }

    .alert.visible { display: block; }

    .btn-login {
      width: 100%;
      padding: 0.95rem;
      background: var(--green-500);
      color: white;
      border: none;
      border-radius: 999px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(74,160,74,0.3);
    }

    .btn-login:hover {
      background: var(--green-600);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(74,160,74,0.4);
    }

    .btn-login:active { transform: translateY(0); }

    .btn-login:disabled {
      background: var(--green-400);
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1.25rem;
      color: var(--text-light);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0ecdf;
    }

    .signup-link {
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-mid);
    }

    .signup-link a {
      color: var(--green-600);
      font-weight: 600;
      text-decoration: none;
    }

    .signup-link a:hover { text-decoration: underline; }

    @media (max-width: 540px) {
      .card { padding: 2rem 1.5rem; border-radius: 20px; }
      .card h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">
        <span class="logo-leaf">🌿</span>
        <span class="logo-text">Dincharya</span>
      </a>
      <a href="/" class="nav-back">← Back to Home</a>
    </div>
  </nav>

  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <main>
    <div class="card">

      <div class="card-badge">🌿 Welcome Back</div>
      <h1>Sign in</h1>
      <p class="card-subtitle">Continue your Ayurvedic wellness journey — pick up right where you left off.</p>

      <div class="alert" id="alertBox"></div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="e.g. arjun@example.com" autocomplete="email" />
          <span class="error-msg" id="emailError">Please enter a valid email address.</span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" />
          <span class="error-msg" id="passwordError">Please enter your password.</span>
        </div>

        <button type="button" class="btn-login" id="loginBtn">Sign In →</button>

      </form>

      <div class="divider">or</div>
      <p class="signup-link">New to Dincharya? <a href="/signup.html">Create an account</a></p>

    </div>
  </main>

  <script>
    var emailInput    = document.getElementById('email');
    var passwordInput = document.getElementById('password');
    var emailError    = document.getElementById('emailError');
    var passwordError = document.getElementById('passwordError');
    var alertBox      = document.getElementById('alertBox');
    var loginBtn      = document.getElementById('loginBtn');

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = 'alert ' + type + ' visible';
    }

    function hideAlert() {
      alertBox.className = 'alert';
    }

    function clearErrors() {
      emailInput.classList.remove('input-error');
      passwordInput.classList.remove('input-error');
      emailError.classList.remove('visible');
      passwordError.classList.remove('visible');
      hideAlert();
    }

    function validate() {
      clearErrors();
      var valid = true;

      if (!emailInput.value.trim() || !isValidEmail(emailInput.value.trim())) {
        emailInput.classList.add('input-error');
        emailError.classList.add('visible');
        valid = false;
      }

      if (!passwordInput.value) {
        passwordInput.classList.add('input-error');
        passwordError.classList.add('visible');
        valid = false;
      }

      return valid;
    }

    loginBtn.addEventListener('click', async function() {
      if (!validate()) return;

      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      try {
        var res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email:    emailInput.value.trim(),
            password: passwordInput.value
          })
        });

        var data = await res.json();

        if (!res.ok) {
          showAlert('⚠️ ' + (data.message || 'Login failed. Please try again.'), 'error');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In →';
          return;
        }

        /* Store user data from server */
        var user = data.user;
        localStorage.setItem('name',     user.name     || '');
        localStorage.setItem('email',    user.email    || '');
        localStorage.setItem('age',      String(user.age || ''));
        localStorage.setItem('goal',     user.goal     || '');
        localStorage.setItem('prakriti', user.prakriti || '');
        localStorage.setItem('guna',     user.guna     || '');

        showAlert('✅ Welcome back, ' + user.name.split(' ')[0] + '!', 'success');

        /* Redirect based on profile completeness */
        setTimeout(function() {
          if (!user.prakriti) {
            window.location.href = '/prakriti.html';
          } else if (!user.guna) {
            window.location.href = '/guna.html';
          } else {
            window.location.href = '/dashboard.html';
          }
        }, 800);

      } catch (err) {
        showAlert('⚠️ Network error. Please check your connection.', 'error');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In →';
      }
    });

    /* Live clear */
    emailInput.addEventListener('input', function() {
      if (isValidEmail(emailInput.value.trim())) {
        emailInput.classList.remove('input-error');
        emailError.classList.remove('visible');
      }
    });

    passwordInput.addEventListener('input', function() {
      if (passwordInput.value) {
        passwordInput.classList.remove('input-error');
        passwordError.classList.remove('visible');
      }
    });
  </script>

</body>
</html>
