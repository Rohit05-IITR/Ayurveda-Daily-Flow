kind = "web"
previewPath = "/"
title = "Dincharya - Wellness App"
version = "1.0.0"
id = "artifacts/dincharya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25525

[services.development]
run = "pnpm --filter @workspace/dincharya run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dincharya", "run", "build" ]
publicDir = "artifacts/dincharya/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25525"
BASE_PATH = "/"
